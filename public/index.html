<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0d1117">
<title>Hand &amp; Foot Score</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--surface:#161b22;--card:#21262d;--card2:#2d333b;
  --border:#30363d;--accent:#7c3aed;--accent2:#a78bfa;
  --gold:#f59e0b;--green:#34d399;--red:#f87171;--blue:#60a5fa;--orange:#fb923c;
  --text:#e6edf3;--muted:#8b949e;--dim:#484f58;
  --r:12px;--rs:8px;
  --safe-b:env(safe-area-inset-bottom,0px);
  --bn:58px;
}
/* ── LIGHT MODE ── */
html.light{
  --bg:#f5f6fa;--surface:#ffffff;--card:#f0f1f5;--card2:#e4e6ed;
  --border:#d0d4de;--accent:#7c3aed;--accent2:#6d28d9;
  --gold:#d97706;--green:#059669;--red:#dc2626;--blue:#2563eb;--orange:#ea580c;
  --text:#111827;--muted:#6b7280;--dim:#9ca3af;
}
html,body{height:100%;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden}
#app{height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden}

/* ═══════════════════════ SETUP ═══════════════════════ */
#screen-setup{display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;min-height:100dvh;padding:24px;gap:22px;overflow-y:auto}
.logo-suits{font-size:2rem;letter-spacing:8px;color:var(--accent2);text-align:center}
.logo-title{font-size:1.9rem;font-weight:800;text-align:center}
.logo-sub{font-size:.84rem;color:var(--muted);text-align:center}
.setup-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  padding:22px;width:100%;max-width:500px;display:flex;flex-direction:column;gap:18px}
.section-label{font-size:.67rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:6px}
.count-row{display:flex;gap:6px}
.count-btn{flex:1;height:44px;border:1px solid var(--border);border-radius:var(--rs);
  background:var(--card);color:var(--text);font-size:1rem;font-weight:600;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent}
.count-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.names-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
input[type=text],input[type=number]{background:var(--card);border:1px solid var(--border);border-radius:var(--rs);
  color:var(--text);font-size:.9rem;padding:10px 12px;width:100%;outline:none;transition:border-color .15s;-webkit-appearance:none}
input[type=text]:focus,input[type=number]:focus{border-color:var(--accent2)}
input[type=number]{text-align:center;font-family:'SF Mono',monospace;font-weight:600}
.btn-primary{height:50px;border-radius:var(--r);border:none;background:var(--accent);
  color:#fff;font-size:1rem;font-weight:700;cursor:pointer;width:100%;transition:opacity .15s,transform .1s}
.btn-primary:active{opacity:.85;transform:scale(.98)}
.btn-ghost{height:42px;border-radius:var(--rs);border:1px solid var(--border);background:transparent;
  color:var(--muted);font-size:.88rem;cursor:pointer;width:100%;transition:background .15s}
.btn-ghost:active{background:var(--card)}

/* ═══════════════════════ MAIN SHELL ═══════════════════════
   Phone/tablet: column layout, bottom nav
   Desktop ≥1024: row layout, left sidebar
══════════════════════════════════════════════════════════ */
#screen-main{display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden}

/* ── LEFT SIDEBAR (desktop only) ── */
#sidebar{display:none;flex-direction:column;width:176px;flex-shrink:0;
  background:var(--surface);border-right:1px solid var(--border);padding-top:16px}
.sb-logo{padding:0 16px 20px;font-size:.88rem;font-weight:800;color:var(--accent2);letter-spacing:.3px}
.sb-logo span{color:var(--dim);font-weight:400;font-size:.7rem;display:block;margin-top:2px}
.sb-nav{display:flex;flex-direction:column;gap:2px;padding:0 8px;flex:1}
.sb-btn{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--rs);
  border:none;background:transparent;color:var(--muted);font-size:.84rem;font-weight:500;
  cursor:pointer;width:100%;text-align:left;transition:background .15s,color .15s;-webkit-tap-highlight-color:transparent}
.sb-btn svg{width:16px;height:16px;flex-shrink:0}
.sb-btn:hover{background:var(--card);color:var(--text)}
.sb-btn.active{background:rgba(124,58,237,.15);color:var(--accent2);font-weight:600}
.sb-divider{height:1px;background:var(--border);margin:8px 0}
.sb-foot{padding:12px 8px 16px;display:flex;flex-direction:column;gap:2px}
.sb-foot .sb-btn{font-size:.78rem}

/* ── BOTTOM NAV (phone + tablet) ── */
#bottom-nav{display:flex;background:var(--surface);border-top:1px solid var(--border);
  padding-bottom:var(--safe-b);flex-shrink:0;order:99}
.bn-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;border:none;background:transparent;color:var(--dim);cursor:pointer;
  padding:7px 0;min-height:var(--bn);transition:color .15s;-webkit-tap-highlight-color:transparent}
.bn-btn.active{color:var(--accent2)}
.bn-btn svg{width:21px;height:21px}
.bn-label{font-size:.6rem;font-weight:600;text-transform:uppercase;letter-spacing:.06em}

/* ── CONTENT WRAPPER (sits between sidebar and bottom nav) ── */
#content-row{flex:1;display:flex;flex-direction:row;overflow:hidden;min-height:0}
#main-content{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* ═══════════════════════ TOP BAR ═══════════════════════ */
#top-bar{background:var(--surface);border-bottom:1px solid var(--border);
  flex-shrink:0;padding:10px 14px 8px;display:flex;flex-direction:column;gap:7px}
.hand-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.hand-badge{font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;
  color:var(--accent2);background:rgba(124,58,237,.15);padding:4px 12px;border-radius:99px}
.hand-pill{font-size:.7rem;color:var(--muted);background:var(--card);
  padding:3px 9px;border-radius:99px;border:1px solid var(--border);white-space:nowrap}
.hand-pill b{color:var(--text);font-weight:700}
.lb-strip{display:flex;gap:10px;overflow-x:auto;scrollbar-width:none;padding:1px 0}
.lb-strip::-webkit-scrollbar{display:none}
.lb-item{display:flex;flex-direction:column;align-items:center;min-width:54px;flex-shrink:0}
.lb-name{font-size:.62rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:60px;text-align:center}
.lb-score{font-size:.88rem;font-weight:700;font-family:'SF Mono',monospace}
.lb-item.leader .lb-name,.lb-item.leader .lb-score{color:var(--gold)}

/* ═══════════════════════ PLAYER TABS ═══════════════════════ */
#player-tabs-bar{display:flex;background:var(--card);border-bottom:1px solid var(--border);
  flex-shrink:0;overflow-x:auto;scrollbar-width:none}
#player-tabs-bar::-webkit-scrollbar{display:none}
.ptab{flex:1;min-width:64px;max-width:140px;display:flex;flex-direction:column;align-items:center;
  padding:8px 4px 7px;border:none;border-bottom:2px solid transparent;
  background:transparent;color:var(--muted);font-size:.75rem;font-weight:500;cursor:pointer;
  white-space:nowrap;transition:all .15s;-webkit-tap-highlight-color:transparent;gap:2px}
.ptab-name{font-weight:600;font-size:.78rem;overflow:hidden;text-overflow:ellipsis;width:100%;text-align:center;max-width:120px}
.ptab-score{font-family:'SF Mono',monospace;font-size:.68rem;color:var(--dim)}
.ptab.active{color:var(--accent2);border-bottom-color:var(--accent2);background:var(--surface)}
.ptab.active .ptab-score{color:var(--accent2)}
.ptab.went-out .ptab-name::after{content:' ★';color:var(--gold)}

/* ═══════════════════════ SCORING PANEL ═══════════════════════ */
#scoring-panel{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px}
.score-player-header{display:flex;align-items:center;justify-content:space-between;
  margin-bottom:14px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.sph-name{font-size:1.1rem;font-weight:700}
.sph-sub{font-size:.75rem;color:var(--muted);margin-top:2px}
.sph-sub b{color:var(--text);font-family:'SF Mono',monospace}
.sph-right{text-align:right}
.sph-rt{font-size:1.5rem;font-weight:800;font-family:'SF Mono',monospace;line-height:1}
.sph-rt.pos{color:var(--green)}.sph-rt.neg{color:var(--red)}.sph-rt.zero{color:var(--dim)}
.sph-rt-lbl{font-size:.62rem;color:var(--muted);margin-top:2px}

.req-bar{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.req-item{display:flex;align-items:center;gap:4px;font-size:.72rem;font-weight:600}
.req-dot{width:9px;height:9px;border-radius:50%;background:var(--dim);flex-shrink:0}
.req-dot.met{background:var(--green)}
.req-label{color:var(--muted)}.req-label.met{color:var(--green)}

/* Score rows */
.score-rows{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.score-row{display:flex;align-items:center;background:var(--card);
  border:1px solid var(--border);border-radius:var(--rs);overflow:hidden;height:50px}
.sr-label{flex:1;padding:0 12px;font-size:.84rem;font-weight:500;
  display:flex;align-items:center;gap:8px;color:var(--text);min-width:0;height:50px}
.sr-label-text{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sr-pts{font-size:.68rem;color:var(--dim);margin-left:auto;padding-right:8px;white-space:nowrap;flex-shrink:0}
.sr-controls{display:flex;align-items:center;flex-shrink:0}
.sr-btn{width:50px;height:50px;border:none;border-left:1px solid var(--border);
  background:var(--surface);color:var(--text);font-size:1.2rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  -webkit-tap-highlight-color:transparent;user-select:none;transition:background .1s}
.sr-btn:active{background:var(--card2)}
.sr-val{width:50px;height:50px;display:flex;align-items:center;justify-content:center;
  font-size:.95rem;font-weight:700;font-family:'SF Mono',monospace;
  border-left:1px solid var(--border);border-right:1px solid var(--border);background:var(--card2)}
.sr-req{width:36px;height:50px;display:flex;align-items:center;justify-content:center;
  font-size:.95rem;font-weight:700;font-family:'SF Mono',monospace;background:var(--card2);border-right:1px solid var(--border);color:var(--muted)}
.sr-req.met{color:var(--green)}

.score-row.r3    .sr-label{color:var(--red)}   .score-row.r3    .sr-val{color:var(--red)}
.score-row.clean .sr-label{color:var(--green)} .score-row.clean .sr-val{color:var(--green)}
.score-row.dirty .sr-label{color:var(--blue)}  .score-row.dirty .sr-val{color:var(--blue)}
.score-row.sevens .sr-label{color:var(--gold)} .score-row.sevens .sr-val{color:var(--gold)}
.score-row.wilds .sr-label{color:var(--orange)}.score-row.wilds .sr-val{color:var(--orange)}
.score-row.meld{background:var(--card)}
.meld-inp{width:90px;height:50px;border:none;border-left:1px solid var(--border);border-right:1px solid var(--border);
  background:var(--card2);color:var(--text);font-size:.95rem;font-weight:700;
  font-family:'SF Mono',monospace;text-align:center;outline:none}

.go-out-row{height:52px;border-radius:var(--rs);border:1px solid var(--border);
  background:var(--card);color:var(--muted);font-size:.9rem;font-weight:600;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:8px;
  transition:all .18s;-webkit-tap-highlight-color:transparent;width:100%;margin-bottom:10px}
.go-out-row.active{background:rgba(245,158,11,.15);border-color:var(--gold);color:var(--gold);font-weight:700}
.go-out-row.blocked{opacity:.4;cursor:default}

/* ═══════════════════════ ACTION BAR ═══════════════════════ */
#action-bar{flex-shrink:0;display:flex;gap:10px;padding:10px 14px calc(10px + var(--safe-b));
  background:var(--surface);border-top:1px solid var(--border)}
.btn-undo{height:50px;min-width:82px;border-radius:var(--rs);border:1px solid var(--border);
  background:var(--card);color:var(--text);font-size:.84rem;font-weight:600;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:4px;flex-shrink:0;transition:background .15s}
.btn-undo:active{background:var(--card2)}
.btn-undo:disabled{opacity:.35;cursor:not-allowed}
.btn-save{flex:1;height:50px;border-radius:var(--rs);border:none;background:var(--accent);
  color:#fff;font-size:1rem;font-weight:700;cursor:pointer;transition:opacity .15s,transform .1s}
.btn-save:active{opacity:.85;transform:scale(.98)}

/* ═══════════════════════ HISTORY ═══════════════════════ */
#view-history{display:flex;flex-direction:column;flex:1;overflow:hidden}
.view-header{padding:13px 16px;background:var(--surface);border-bottom:1px solid var(--border);
  flex-shrink:0;font-size:1rem;font-weight:700}
.history-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:12px;
  display:flex;flex-direction:column;gap:10px}

/* Summary table */
.summary-table-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.stc-title{padding:10px 14px;font-size:.67rem;font-weight:700;text-transform:uppercase;
  letter-spacing:.1em;color:var(--muted);background:var(--card);border-bottom:1px solid var(--border)}
.summary-table-wrap{overflow-x:auto}
.summary-table{width:100%;border-collapse:collapse;font-size:.8rem}
.summary-table th{padding:8px 12px;text-align:right;font-size:.7rem;font-weight:700;
  color:var(--muted);background:var(--card);border-bottom:1px solid var(--border);white-space:nowrap}
.summary-table th:first-child{text-align:left;min-width:100px}
.summary-table td{padding:7px 12px;text-align:right;font-family:'SF Mono',monospace;
  border-bottom:1px solid var(--border);font-size:.78rem}
.summary-table td:first-child{text-align:left;font-family:inherit;color:var(--muted);font-size:.76rem}
.summary-table tr:last-child td{border-bottom:none}
.summary-table .row-sub td{font-weight:600;color:var(--text);background:rgba(124,58,237,.05);border-top:1px solid var(--border)}
.summary-table .row-grand td{font-weight:800;color:var(--gold);background:rgba(245,158,11,.07);
  border-top:2px solid var(--border);font-size:.82rem}
.summary-table .col-winner{color:var(--gold)!important;font-weight:700!important}

/* Round accordion */
.round-row{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.rr-head{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;
  cursor:pointer;gap:8px;-webkit-tap-highlight-color:transparent}
.rr-num{font-weight:700;font-size:.9rem;flex-shrink:0}
.rr-scores{display:flex;gap:6px;flex-wrap:wrap;flex:1;overflow:hidden}
.rr-ps{font-size:.72rem;color:var(--muted);white-space:nowrap}
.rr-ps b{color:var(--text);font-family:'SF Mono',monospace}
.rr-chevron{color:var(--dim);font-size:.75rem;flex-shrink:0;transition:transform .2s}
.round-row.open .rr-chevron{transform:rotate(180deg)}
.rr-detail{display:none;border-top:1px solid var(--border);padding:12px}
.round-row.open .rr-detail{display:block}
.detail-table{width:100%;border-collapse:collapse;font-size:.75rem}
.detail-table th{text-align:right;color:var(--muted);font-weight:600;padding:3px 8px 3px 0;font-size:.68rem}
.detail-table th:first-child{text-align:left}
.detail-table td{text-align:right;font-family:'SF Mono',monospace;padding:4px 8px 4px 0}
.detail-table td:first-child{text-align:left;font-family:inherit;color:var(--muted)}
.detail-table tr.tot td{border-top:1px solid var(--border);font-weight:700;color:var(--text);padding-top:7px}
.rr-actions{display:flex;gap:8px;margin-top:10px}
.btn-sm{height:34px;padding:0 12px;border-radius:var(--rs);font-size:.78rem;font-weight:600;cursor:pointer;border:1px solid var(--border);transition:background .15s}
.btn-sm-plain{background:var(--card);color:var(--text)}.btn-sm-plain:active{background:var(--card2)}
.btn-sm-danger{background:var(--card);color:var(--red);border-color:var(--red)}.btn-sm-danger:active{background:rgba(248,113,113,.12)}

.totals-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px}
.totals-title{font-size:.67rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:10px}
.totals-row{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;
  background:var(--card);border-radius:var(--rs);margin-bottom:6px}
.totals-row:last-child{margin-bottom:0}
.totals-row.leader{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3)}
.totals-name{font-weight:600;font-size:.88rem}
.totals-score{font-family:'SF Mono',monospace;font-weight:700;font-size:1.05rem}
.totals-row.leader .totals-name,.totals-row.leader .totals-score{color:var(--gold)}

/* ═══════════════════════ RULES ═══════════════════════ */
#view-rules{display:flex;flex-direction:column;flex:1;overflow:hidden}
.rules-scroll{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px}
.rules-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.r-title{padding:8px 14px;font-size:.65rem;font-weight:700;text-transform:uppercase;
  letter-spacing:.1em;color:var(--muted);background:var(--card);border-bottom:1px solid var(--border)}
.hand-grid{display:grid;grid-template-columns:1fr 1fr;gap:0}
.hand-col{padding:12px 14px;border-right:1px solid var(--border);border-bottom:1px solid var(--border)}
.hand-col:nth-child(even){border-right:none}
.hand-col:nth-last-child(-n+2){border-bottom:none}
.hand-num{font-size:.63rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--accent2);margin-bottom:6px}
.hand-stat{display:flex;justify-content:space-between;font-size:.75rem;padding:2px 0}
.hand-stat-lbl{color:var(--muted)}.hand-stat-val{font-weight:600;font-family:'SF Mono',monospace}
.hand-stat-val.gold{color:var(--gold)}
.scoring-rows{padding:10px 14px;display:flex;flex-direction:column;gap:4px}
.scoring-row{display:flex;justify-content:space-between;align-items:center;padding:7px 10px;border-radius:var(--rs);background:var(--card)}
.scoring-row-lbl{font-size:.8rem;color:var(--muted);display:flex;align-items:center;gap:6px}
.scoring-row-val{font-size:.84rem;font-weight:700;font-family:'SF Mono',monospace}
.score-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.rules-note{padding:10px 14px;font-size:.78rem;color:var(--muted);line-height:1.75}
.rules-note li{margin-left:14px;margin-bottom:3px}.rules-note b{color:var(--text)}
.settings-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden}
.s-section-title{padding:8px 14px;font-size:.65rem;font-weight:700;text-transform:uppercase;
  letter-spacing:.1em;color:var(--muted);background:var(--card);border-bottom:1px solid var(--border)}
.export-row{padding:10px;display:flex;gap:8px}
.btn-export{flex:1;height:40px;border-radius:var(--rs);border:1px solid var(--border);
  background:var(--card);color:var(--text);font-size:.8rem;font-weight:600;cursor:pointer;transition:background .15s}
.btn-export:active{background:var(--card2)}
.danger-row{padding:10px;display:flex;flex-direction:column;gap:8px}
.btn-danger{height:44px;border-radius:var(--rs);border:1px solid var(--red);background:transparent;
  color:var(--red);font-size:.86rem;font-weight:600;cursor:pointer;width:100%;transition:background .15s}
.btn-danger:active{background:rgba(248,113,113,.1)}

/* ═══════════════════════ MODALS ═══════════════════════ */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);
  display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;backdrop-filter:blur(6px)}
.overlay.bottom{align-items:flex-end;padding:0}
.modal-sheet{background:var(--surface);border-radius:16px;padding:22px;width:100%;max-width:400px;
  display:flex;flex-direction:column;gap:14px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.overlay.bottom .modal-sheet{border-radius:20px 20px 0 0;max-width:560px;padding:22px 22px calc(22px + var(--safe-b))}
.modal-title{font-size:1.05rem;font-weight:700}
.modal-body{font-size:.88rem;color:var(--muted);line-height:1.5}
.modal-actions{display:flex;gap:8px}
.modal-actions button{flex:1;height:46px;border-radius:var(--rs);font-size:.9rem;font-weight:700;cursor:pointer;border:none}
.btn-cancel{background:var(--card);color:var(--text);border:1px solid var(--border)!important}
.btn-ok{background:var(--accent);color:#fff}
.btn-ok-danger{background:var(--red);color:#fff}
.summary-rows{display:flex;flex-direction:column;gap:7px}
.sum-row{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;background:var(--card);border-radius:var(--rs)}
.sum-name{font-weight:600;font-size:.9rem}
.sum-delta{font-family:'SF Mono',monospace;font-weight:700;font-size:1rem}
.sum-run{font-size:.7rem;color:var(--muted);text-align:right;margin-top:2px}
.sum-winner{background:rgba(245,158,11,.15);border:1px solid rgba(245,158,11,.4)}
.sum-winner .sum-name,.sum-winner .sum-delta{color:var(--gold)}

/* ═══════════════════════ TOAST ═══════════════════════ */
#toast{position:fixed;bottom:calc(var(--bn) + var(--safe-b) + 12px);left:50%;transform:translateX(-50%);
  background:var(--card2);color:var(--text);padding:9px 18px;border-radius:99px;font-size:.82rem;
  font-weight:600;z-index:999;pointer-events:none;transition:opacity .3s;white-space:nowrap;
  border:1px solid var(--border);opacity:0;box-shadow:0 4px 20px rgba(0,0,0,.4)}
#toast.show{opacity:1}

@keyframes flash{0%{background:rgba(52,211,153,.15)}100%{background:transparent}}
.flash{animation:flash .4s ease-out}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:56px 24px;gap:12px;color:var(--muted);text-align:center;flex:1}
.empty-icon{font-size:2.5rem;opacity:.3}
.empty p{font-size:.86rem;line-height:1.65}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--dim);border-radius:2px}

/* ═══════════════════════ BREAKPOINTS ═══════════════════════ */
/* Tablet ≥600 — hand grid 4-col in rules */
@media(min-width:600px){
  .hand-grid{grid-template-columns:repeat(4,1fr)}
  .hand-col:nth-child(even){border-right:1px solid var(--border)}
  .hand-col:nth-child(4n){border-right:none}
  .hand-col{border-bottom:1px solid var(--border)}
  .hand-col:nth-last-child(-n+4){border-bottom:none}
  #scoring-panel{padding:16px 20px}
}

/* Desktop ≥1024 — sidebar visible, bottom nav hidden, row layout */
@media(min-width:1024px){
  :root{--bn:0px}
  #screen-main{flex-direction:row}
  #sidebar{display:flex}
  #bottom-nav{display:none}
  #content-row{flex-direction:row}
  #toast{bottom:20px}
  /* center scoring panel with max width */
  #scoring-panel{padding:20px 24px}
  .score-row,.go-out-row{height:52px}
  .sr-btn{width:52px;height:52px}
  .sr-val{width:54px;height:52px}
  .sr-req{width:38px;height:52px}
  .meld-inp{height:52px;width:100px}
  /* content row inside screen-main is the sidebar + content area, already row */
}

/* Landscape phone — compact */
@media(orientation:landscape)and(max-height:500px){
  #top-bar{padding:6px 12px}
  .lb-strip{display:none}
  .score-row,.go-out-row{height:42px}
  .sr-btn{width:44px;height:42px}
  .sr-val{width:46px;height:42px}
  .sr-req{width:32px;height:42px}
  .meld-inp{height:42px}
  #scoring-panel{padding:8px 12px}
  #action-bar{padding:6px 12px calc(6px + var(--safe-b))}
  .btn-undo,.btn-save{height:42px}
}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast"></div>
<script>
// ─────────────────────────────────────────────────────────────
// CONSTANTS
// ─────────────────────────────────────────────────────────────
const HAND_RULES=[
  {hand:1,drawCount:3, meldMin:90, goOutBonus:300,reqClean:3,reqDirty:3},
  {hand:2,drawCount:4, meldMin:120,goOutBonus:400,reqClean:4,reqDirty:4},
  {hand:3,drawCount:5, meldMin:150,goOutBonus:500,reqClean:5,reqDirty:5},
  {hand:4,drawCount:6, meldMin:180,goOutBonus:600,reqClean:6,reqDirty:6},
];
const SCORING={red3:100,dirtyBook:300,cleanBook:500,bookOf7s:1000,bookOfWilds:1500};

// ─────────────────────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────────────────────
let S={
  screen:'setup',view:'game',activePlayer:0,
  playerCount:4,
  playerNames:['Alice','Bob','Carol','Dave','Eve','Frank'],
  rounds:[],cur:null,undo:[],
  editingIndex:null,   // null = new round, number = re-inserting at this index
};

// ─────────────────────────────────────────────────────────────
// PERSIST
// ─────────────────────────────────────────────────────────────
function save(){
  try{localStorage.setItem('hnf3',JSON.stringify({
    screen:S.screen,view:S.view,activePlayer:S.activePlayer,
    playerCount:S.playerCount,playerNames:S.playerNames,
    rounds:S.rounds,cur:S.cur
  }));}catch(e){}
}
function load(){
  try{
    const d=JSON.parse(localStorage.getItem('hnf3')||'null');
    if(!d)return;
    S.screen=d.screen||'setup';S.view=d.view||'game';
    S.activePlayer=d.activePlayer||0;S.playerCount=d.playerCount||4;
    S.playerNames=d.playerNames||['Alice','Bob','Carol','Dave','Eve','Frank'];
    S.rounds=d.rounds||[];S.cur=d.cur||null;
  }catch(e){}
}

// ─────────────────────────────────────────────────────────────
// CALC
// ─────────────────────────────────────────────────────────────
const handRule=n=>HAND_RULES[Math.min(n-1,3)];
function calcRound(sc,rn){
  const r=handRule(rn);
  return sc.meldPoints+sc.red3Count*SCORING.red3+sc.cleanBooks*SCORING.cleanBook
    +sc.dirtyBooks*SCORING.dirtyBook+sc.bookOf7s*SCORING.bookOf7s
    +sc.bookOfWilds*SCORING.bookOfWilds+(sc.wentOut?r.goOutBonus:0);
}
function runningTotal(pid,rounds){
  return rounds.reduce((s,r)=>{const sc=r.scores.find(x=>x.playerId===pid);return s+(sc?sc.roundTotal:0);},0);
}
function blankScore(pid){
  return{playerId:pid,meldPoints:0,red3Count:0,cleanBooks:0,dirtyBooks:0,bookOf7s:0,bookOfWilds:0,wentOut:false,roundTotal:0};
}
function recompute(){if(!S.cur)return;S.cur.scores.forEach(sc=>{sc.roundTotal=calcRound(sc,S.cur.roundNumber);});}
function canGoOut(sc){const r=handRule(S.cur.roundNumber);return sc.cleanBooks>=r.reqClean&&sc.dirtyBooks>=r.reqDirty;}
function initRound(){S.cur={roundNumber:S.rounds.length+1,scores:range(S.playerCount).map(blankScore)};S.undo=[];S.editingIndex=null;}

// ─────────────────────────────────────────────────────────────
// UTILS
// ─────────────────────────────────────────────────────────────
const h=s=>String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const range=n=>Array.from({length:n},(_,i)=>i);
const $=id=>document.getElementById(id);
let _tt;
function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('show'),2100);}
function flash(){const el=$('scoring-panel');if(el){el.classList.remove('flash');void el.offsetWidth;el.classList.add('flash');}}

// ─────────────────────────────────────────────────────────────
// MODAL
// ─────────────────────────────────────────────────────────────
function showModal(html,bottom=false){
  let ov=$('modal-ov');
  if(!ov){ov=document.createElement('div');ov.id='modal-ov';document.body.appendChild(ov);}
  ov.className='overlay'+(bottom?' bottom':'');
  ov.innerHTML=`<div class="modal-sheet">${html}</div>`;
  ov.onclick=e=>{if(e.target===ov)closeModal();};
}
function closeModal(){const ov=$('modal-ov');if(ov)ov.remove();}
function confirmDialog(title,body,onOk,danger=true){
  showModal(`<div class="modal-title">${h(title)}</div>
    <div class="modal-body">${h(body)}</div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="${danger?'btn-ok-danger':'btn-ok'}" onclick="closeModal();(${onOk.toString()})()">Confirm</button>
    </div>`);
}

// ─────────────────────────────────────────────────────────────
// SCORE ACTIONS
// ─────────────────────────────────────────────────────────────
function adj(pid,field,delta){
  const sc=S.cur.scores.find(s=>s.playerId===pid);if(!sc)return;
  S.undo.push({pid,field,prev:sc[field]});if(S.undo.length>80)S.undo.shift();
  sc[field]=Math.max(0,sc[field]+delta);
  recompute();save();patchPanel();flash();
}
function setVal(pid,field,value){
  const sc=S.cur.scores.find(s=>s.playerId===pid);if(!sc)return;
  S.undo.push({pid,field,prev:sc[field]});
  sc[field]=Math.max(0,Number(value)||0);
  recompute();save();patchPanel();
}
function toggleOut(pid){
  const sc=S.cur.scores.find(s=>s.playerId===pid);if(!sc)return;
  const next=!sc.wentOut;
  if(next&&!canGoOut(sc)){const r=handRule(S.cur.roundNumber);toast(`Need ${r.reqClean} clean & ${r.reqDirty} dirty books to go out`);return;}
  S.undo.push({pid,field:'wentOut',prev:sc.wentOut});
  if(next)S.cur.scores.forEach(s=>{s.wentOut=false;});
  sc.wentOut=next;recompute();save();renderGameView();
}
function undoLast(){
  const item=S.undo.pop();if(!item)return;
  const sc=S.cur.scores.find(s=>s.playerId===item.pid);if(sc)sc[item.field]=item.prev;
  recompute();save();
  if(item.field==='wentOut')renderGameView();else patchPanel();
  toast('Undone');
}

// ─────────────────────────────────────────────────────────────
// PATCH PANEL (in-place DOM update)
// ─────────────────────────────────────────────────────────────
function patchPanel(){
  const pid=S.activePlayer;
  const sc=S.cur.scores.find(s=>s.playerId===pid);if(!sc){renderGameView();return;}
  const rt=sc.roundTotal;
  const rtEl=document.querySelector('.sph-rt');
  if(rtEl){rtEl.textContent=(rt>0?'+':'')+rt.toLocaleString();rtEl.className='sph-rt '+(rt>0?'pos':rt<0?'neg':'zero');}
  const runEl=document.querySelector('.sph-sub b');
  if(runEl)runEl.textContent=(runningTotal(pid,S.rounds)+rt).toLocaleString();
  const rb=document.querySelector('.req-bar');if(rb)rb.innerHTML=buildReqBar(sc);
  const fields={r3:'red3Count',clean:'cleanBooks',dirty:'dirtyBooks',sevens:'bookOf7s',wilds:'bookOfWilds'};
  Object.entries(fields).forEach(([cls,field])=>{
    const row=document.querySelector(`.score-row.${cls}`);if(!row)return;
    const v=row.querySelector('.sr-val');if(v)v.textContent=sc[field];
    const r=row.querySelector('.sr-req');
    if(r){const req=parseInt(r.dataset.req||'0');r.className='sr-req'+(sc[field]>=req?' met':'');}
  });
  const mi=document.querySelector('.meld-inp');if(mi&&document.activeElement!==mi)mi.value=sc.meldPoints;
  const goBtn=document.querySelector('.go-out-row');
  if(goBtn){
    const canGo=canGoOut(sc),out=sc.wentOut;
    goBtn.className='go-out-row'+(out?' active':canGo?'':' blocked');
    goBtn.innerHTML=out?'★ Went Out — tap to cancel':'☆ Go Out';
  }
  patchTabs();patchLeaderboard();
  const ub=document.querySelector('.btn-undo');if(ub)ub.disabled=S.undo.length===0;
}
function patchTabs(){
  document.querySelectorAll('.ptab').forEach(tab=>{
    const pid=parseInt(tab.dataset.pid);
    const sc=S.cur.scores.find(s=>s.playerId===pid);if(!sc)return;
    const sc2=tab.querySelector('.ptab-score');
    if(sc2){const rt=sc.roundTotal;sc2.textContent=(rt>0?'+':'')+rt.toLocaleString();}
    tab.classList.toggle('went-out',sc.wentOut);tab.classList.toggle('active',pid===S.activePlayer);
  });
}
function patchLeaderboard(){
  const strip=document.querySelector('.lb-strip');if(!strip||!S.cur)return;strip.innerHTML=lbHTML();
}
function lbHTML(){
  return S.cur.scores
    .map(sc=>({name:S.playerNames[sc.playerId]||'P'+(sc.playerId+1),total:runningTotal(sc.playerId,S.rounds)+sc.roundTotal}))
    .sort((a,b)=>b.total-a.total)
    .map((p,i)=>`<div class="lb-item ${i===0?'leader':''}">
      <div class="lb-name">${h(p.name)}</div>
      <div class="lb-score">${p.total.toLocaleString()}</div>
    </div>`).join('');
}
function buildReqBar(sc){
  const rule=handRule(S.cur.roundNumber);
  return[
    {label:`${rule.reqClean} Clean`,met:sc.cleanBooks>=rule.reqClean},
    {label:`${rule.reqDirty} Dirty`,met:sc.dirtyBooks>=rule.reqDirty},
  ].map(it=>`<div class="req-item"><div class="req-dot ${it.met?'met':''}"></div><span class="req-label ${it.met?'met':''}">${it.label}</span></div>`).join('');
}

// ─────────────────────────────────────────────────────────────
// ROUND FLOW
// ─────────────────────────────────────────────────────────────
function trySaveRound(){
  if(!S.cur.scores.some(s=>s.wentOut))
    confirmDialog('No one went out','No player is marked as going out. Save hand anyway?',doSaveRound,false);
  else doSaveRound();
}
function doSaveRound(){
  recompute();
  var saved=JSON.parse(JSON.stringify(S.cur));
  if(S.editingIndex!==null){
    // re-insert at original position
    S.rounds.splice(S.editingIndex,0,saved);
    S.editingIndex=null;
  } else {
    S.rounds.push(saved);
  }
  save();showRoundSummary();
}
function showRoundSummary(){
  // find the round we just saved by roundNumber
  var rn=S.cur?S.cur.roundNumber:(S.rounds[S.rounds.length-1]?S.rounds[S.rounds.length-1].roundNumber:1);
  const round=S.rounds.find(r=>r.roundNumber===rn)||S.rounds[S.rounds.length-1];
  const allHandsDone=S.rounds.length>=4&&[1,2,3,4].every(n=>S.rounds.some(r=>r.roundNumber===n));
  const isLast=allHandsDone;
  const maxR=Math.max(...round.scores.map(s=>s.roundTotal));
  const rows=round.scores.map(sc=>{
    const running=runningTotal(sc.playerId,S.rounds);
    const cls=sc.roundTotal>0?'color:var(--green)':sc.roundTotal<0?'color:var(--red)':'color:var(--dim)';
    const winner=sc.roundTotal===maxR&&maxR>0;
    return `<div class="sum-row ${winner?'sum-winner':''}">
      <div><div class="sum-name">${h(S.playerNames[sc.playerId]||'P'+(sc.playerId+1))}</div>
      ${sc.wentOut?'<div style="font-size:.65rem;color:var(--gold)">★ Went Out</div>':''}</div>
      <div><div class="sum-delta" style="${winner?'':cls}">${sc.roundTotal>0?'+':''}${sc.roundTotal.toLocaleString()}</div>
      <div class="sum-run">Total: ${running.toLocaleString()}</div></div>
    </div>`;
  }).join('');
  showModal(`<div class="modal-title">Hand ${round.roundNumber} Complete</div>
    <div class="summary-rows">${rows}</div>
    <div class="modal-actions">
      <button class="btn-ok" onclick="closeModal();afterRound(${isLast})">${isLast?'🏆 Final Scores':`Start Hand ${round.roundNumber+1} →`}</button>
    </div>`,true);
}
function afterRound(isLast){
  S.cur=null;
  if(isLast){S.view='history';render();}
  else{
    // find the lowest hand number not yet saved
    var done=S.rounds.map(r=>r.roundNumber);
    var next=[1,2,3,4].find(n=>!done.includes(n));
    if(next){
      S.cur={roundNumber:next,scores:range(S.playerCount).map(blankScore)};
      S.undo=[];
    } else {
      S.view='history';
    }
    S.activePlayer=0;render();
  }
}

// ─────────────────────────────────────────────────────────────
// RENDER: SETUP
// ─────────────────────────────────────────────────────────────
function renderSetup(){
  const hasGame=S.rounds.length>0||S.cur;
  const counts=[2,3,4,5,6].map(n=>
    `<button class="count-btn ${S.playerCount===n?'active':''}" onclick="setPlayerCount(${n})">${n}</button>`
  ).join('');
  const nameInputs=range(S.playerCount).map(i=>
    `<input type="text" class="pname" data-i="${i}" value="${h(S.playerNames[i]||'Player '+(i+1))}" placeholder="Player ${i+1}" maxlength="16">`
  ).join('');
  return `<div id="screen-setup">
    <div class="logo-suits">♠ ♥ ♣ ♦</div>
    <div class="logo-title">Hand &amp; Foot</div>
    <div class="logo-sub">Progressive Score Keeper • 4 Hands</div>
    <div class="setup-card">
      <div><div class="section-label">Players / Teams</div><div class="count-row">${counts}</div></div>
      <div><div class="section-label">Names</div><div class="names-grid">${nameInputs}</div></div>
      <button class="btn-primary" onclick="startGame()">Start Game</button>
      ${hasGame?`<button class="btn-ghost" onclick="resumeGame()">Resume Last Game</button>`:''}
    </div>
  </div>`;
}

// ─────────────────────────────────────────────────────────────
// RENDER: SIDEBAR + BOTTOM NAV
// ─────────────────────────────────────────────────────────────
const NAV=[
  ['game','Game',`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>`],
  ['history','History',`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12h6M9 16h4"/></svg>`],
  ['rules','Rules',`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>`],
];
function renderSidebar(){
  const btns=NAV.map(([id,lbl,ico])=>
    `<button class="sb-btn ${S.view===id?'active':''}" onclick="switchView('${id}')">${ico}${lbl}</button>`
  ).join('');
  return `<div id="sidebar">
    <div class="sb-logo">♠ Hand &amp; Foot<span>Score Keeper</span></div>
    <div class="sb-nav">${btns}</div>
    <div class="sb-foot">
      <div class="sb-divider"></div>
      <button class="sb-btn" onclick="exportJSON()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Export JSON</button>
      <button class="sb-btn" onclick="exportCSV()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>Export CSV</button>
      <button class="sb-btn" id="sb-theme-btn" onclick="toggleTheme()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg><span id="sb-theme-lbl">Light Mode</span></button>
      <button class="sb-btn" style="color:var(--red)" onclick="newGameConfirm()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.5"/></svg>New Game</button>
    </div>
  </div>`;
}
function renderBottomNav(){
  const moreSvg=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="5" cy="12" r="1.5" fill="currentColor"/><circle cx="12" cy="12" r="1.5" fill="currentColor"/><circle cx="19" cy="12" r="1.5" fill="currentColor"/></svg>`;
  return `<nav id="bottom-nav">${NAV.map(([id,lbl,ico])=>
    `<button class="bn-btn ${S.view===id?'active':''}" onclick="switchView('${id}')">${ico}<span class="bn-label">${lbl}</span></button>`
  ).join('')}<button class="bn-btn" onclick="showMore()">${moreSvg}<span class="bn-label">More</span></button></nav>`;
}
function showMore(){
  var isLight=document.documentElement.classList.contains('light');
  var themeLabel=isLight?'&#x263D; Dark Mode':'&#x2600; Light Mode';
  var html='<div class="modal-title">Options</div>'
    +'<div style="display:flex;flex-direction:column;gap:8px">'
    +'<button class="btn-export" style="height:46px;font-size:.88rem" onclick="closeModal();toggleTheme()">'+themeLabel+'</button>'
    +'<button class="btn-export" style="height:46px;font-size:.88rem" onclick="closeModal();exportJSON()">&#x2B07; Export JSON</button>'
    +'<button class="btn-export" style="height:46px;font-size:.88rem" onclick="closeModal();exportCSV()">&#x2B07; Export CSV</button>'
    +'<button class="btn-danger" style="margin-top:4px" onclick="closeModal();newGameConfirm()">&#x21BA; New Game</button>'
    +'</div>'
    +'<div class="modal-actions" style="margin-top:4px">'
    +'<button class="btn-cancel" onclick="closeModal()">Cancel</button>'
    +'</div>';
  showModal(html,true);
}

// ─────────────────────────────────────────────────────────────
// RENDER: GAME VIEW
// ─────────────────────────────────────────────────────────────
function renderGameView(){
  const mc=$('main-content');if(!mc)return;
  if(!S.cur){mc.innerHTML=`<div class="empty"><div class="empty-icon">♠</div><p>No active game</p></div>`;return;}
  const rule=handRule(S.cur.roundNumber);
  const pid=S.activePlayer;
  const sc=S.cur.scores.find(s=>s.playerId===pid)||S.cur.scores[0];

  const tabs=S.cur.scores.map(s=>{
    const rt=s.roundTotal;const name=S.playerNames[s.playerId]||'P'+(s.playerId+1);
    return `<button class="ptab ${s.playerId===pid?'active':''} ${s.wentOut?'went-out':''}"
      data-pid="${s.playerId}" onclick="selectPlayer(${s.playerId})">
      <span class="ptab-name">${h(name)}</span>
      <span class="ptab-score">${rt>0?'+':''}${rt.toLocaleString()}</span>
    </button>`;
  }).join('');

  const row=(cls,emoji,label,field,reqVal,pts)=>{
    const val=sc[field];const met=reqVal!==null&&val>=reqVal;
    const reqHtml=reqVal!==null?`<span class="sr-req ${met?'met':''}" data-req="${reqVal}">/${reqVal}</span>`:'';
    return `<div class="score-row ${cls}">
      <div class="sr-label"><span class="sr-label-text">${emoji} ${label}</span><span class="sr-pts">${pts}</span></div>
      <div class="sr-controls">
        <button class="sr-btn" ontouchstart="" onclick="adj(${pid},'${field}',-1)">−</button>
        <span class="sr-val">${val}</span>${reqHtml}
        <button class="sr-btn" ontouchstart="" onclick="adj(${pid},'${field}',1)">+</button>
      </div>
    </div>`;
  };

  const rt=sc.roundTotal;const running=runningTotal(pid,S.rounds)+rt;const canGo=canGoOut(sc);

  mc.innerHTML=`
    <div id="top-bar">
      <div class="hand-meta">
        <span class="hand-badge">${S.editingIndex!==null?'Editing ':''}Hand ${S.cur.roundNumber} of 4</span>
        <span class="hand-pill">Draw <b>${rule.drawCount}</b></span>
        <span class="hand-pill">Meld <b>${rule.meldMin}+</b></span>
        <span class="hand-pill">Go out <b>+${rule.goOutBonus}</b></span>
      </div>
      <div class="lb-strip">${lbHTML()}</div>
    </div>
    <div id="player-tabs-bar">${tabs}</div>
    <div id="scoring-panel">
      <div class="score-player-header">
        <div>
          <div class="sph-name">${h(S.playerNames[pid]||'P'+(pid+1))}</div>
          <div class="sph-sub">Running total: <b>${running.toLocaleString()}</b></div>
        </div>
        <div class="sph-right">
          <div class="sph-rt ${rt>0?'pos':rt<0?'neg':'zero'}">${rt>0?'+':''}${rt.toLocaleString()}</div>
          <div class="sph-rt-lbl">this hand</div>
        </div>
      </div>
      <div class="req-bar">${buildReqBar(sc)}</div>
      <div class="score-rows">
        ${row('r3',   '🔴','Red 3s',        'red3Count',  null,       '+100 ea')}
        ${row('clean','♣', 'Clean Books',   'cleanBooks', rule.reqClean,'+500 ea')}
        ${row('dirty','♦', 'Dirty Books',   'dirtyBooks', rule.reqDirty,'+300 ea')}
        ${row('sevens','7️⃣','Book of 7s',   'bookOf7s',   null,       '+1,000 ea')}
        ${row('wilds','🃏', 'Book of Wilds', 'bookOfWilds',null,       '+1,500 ea')}
      </div>
      <button class="go-out-row ${sc.wentOut?'active':canGo?'':'blocked'}" ontouchstart="" onclick="toggleOut(${pid})">
        ${sc.wentOut?'★ Went Out — tap to cancel':'☆ Go Out'}
      </button>
      <div class="score-rows">
        <div class="score-row meld">
          <div class="sr-label"><span class="sr-label-text">📋 Points of all cards</span><span class="sr-pts">face value</span></div>
          <div class="sr-controls">
            <button class="sr-btn" ontouchstart="" onclick="adj(${pid},'meldPoints',-10)">−</button>
            <input class="meld-inp" data-field="meldPoints" type="number" min="0" value="${sc.meldPoints}"
              onchange="setVal(${pid},'meldPoints',this.value)" onfocus="this.select()">
            <button class="sr-btn" ontouchstart="" onclick="adj(${pid},'meldPoints',10)">+</button>
          </div>
        </div>
      </div>
    </div>
    <div id="action-bar">
      <button class="btn-undo" ${S.undo.length?'':'disabled'} onclick="undoLast()">↩ Undo</button>
      <button class="btn-save" onclick="trySaveRound()">${S.editingIndex!==null?'Update':'Save'} Hand ${S.cur.roundNumber} →</button>
    </div>`;
}

// ─────────────────────────────────────────────────────────────
// RENDER: HISTORY
// ─────────────────────────────────────────────────────────────
function renderHistory(){
  if(S.rounds.length===0) return `<div id="view-history" style="display:flex;flex-direction:column;flex:1;overflow:hidden">
    <div class="view-header">Hand History</div>
    <div class="empty"><div class="empty-icon">📋</div><p>No completed hands yet.<br>Save a hand to see history here.</p></div>
  </div>`;

  const names=range(S.playerCount).map(i=>S.playerNames[i]||'P'+(i+1));
  const thCols=names.map(n=>`<th>${h(n)}</th>`).join('');

  // Per-hand rows
  const handRows=S.rounds.map(r=>{
    const maxPts=Math.max(...r.scores.map(s=>s.roundTotal));
    const rule=handRule(r.roundNumber);
    const cols=range(S.playerCount).map(pid=>{
      const sc=r.scores.find(s=>s.playerId===pid);if(!sc)return'<td>—</td>';
      const winner=sc.roundTotal===maxPts&&maxPts>0;
      return `<td class="${winner?'col-winner':''}">${sc.roundTotal>0?'+':''}${sc.roundTotal.toLocaleString()}</td>`;
    }).join('');
    return `<tr><td>Hand ${r.roundNumber}<br><span style="font-size:.65rem;color:var(--dim)">Meld ${rule.meldMin}+ · Go out +${rule.goOutBonus}</span></td>${cols}</tr>`;
  }).join('');

  // Cumulative subtotals
  const cumRows=S.rounds.map((_,ri)=>{
    const cols=range(S.playerCount).map(pid=>{
      const sub=S.rounds.slice(0,ri+1).reduce((s,r)=>{const sc=r.scores.find(x=>x.playerId===pid);return s+(sc?sc.roundTotal:0);},0);
      return `<td>${sub.toLocaleString()}</td>`;
    }).join('');
    return `<tr class="row-sub"><td>After Hand ${ri+1}</td>${cols}</tr>`;
  }).join('');

  // Grand total
  const grandCols=range(S.playerCount).map(pid=>{
    const tot=runningTotal(pid,S.rounds);
    const maxTot=Math.max(...range(S.playerCount).map(i=>runningTotal(i,S.rounds)));
    return `<td class="${tot===maxTot?'col-winner':''}">${tot.toLocaleString()}</td>`;
  }).join('');

  // Accordion detail rows
  const roundRows=S.rounds.map((round,ri)=>{
    const rule=handRule(round.roundNumber);
    const chips=round.scores.map(sc=>
      `<span class="rr-ps">${h(S.playerNames[sc.playerId]||'P'+(sc.playerId+1))}: <b>${sc.roundTotal>0?'+':''}${sc.roundTotal.toLocaleString()}</b></span>`
    ).join('');
    const thC=round.scores.map(sc=>`<th>${h(S.playerNames[sc.playerId]||'P'+(sc.playerId+1))}</th>`).join('');
    const dRows=[
      ['Red 3s (×100)',sc=>sc.red3Count?`${sc.red3Count} (+${(sc.red3Count*SCORING.red3).toLocaleString()})`:'—'],
      ['Clean (×500)',sc=>sc.cleanBooks?`${sc.cleanBooks} (+${(sc.cleanBooks*SCORING.cleanBook).toLocaleString()})`:'—'],
      ['Dirty (×300)',sc=>sc.dirtyBooks?`${sc.dirtyBooks} (+${(sc.dirtyBooks*SCORING.dirtyBook).toLocaleString()})`:'—'],
      ['Book of 7s (×1000)',sc=>sc.bookOf7s?`${sc.bookOf7s} (+${(sc.bookOf7s*SCORING.bookOf7s).toLocaleString()})`:'—'],
      ['Book of Wilds (×1500)',sc=>sc.bookOfWilds?`${sc.bookOfWilds} (+${(sc.bookOfWilds*SCORING.bookOfWilds).toLocaleString()})`:'—'],
      ['Went out',sc=>sc.wentOut?`+${rule.goOutBonus}`:'—'],
      ['Card pts (meld)',sc=>sc.meldPoints?sc.meldPoints.toLocaleString():'—'],
    ].map(([lbl,fn])=>`<tr><td>${lbl}</td>${round.scores.map(sc=>`<td>${fn(sc)}</td>`).join('')}</tr>`).join('');
    const totRow=`<tr class="tot"><td>Total</td>${round.scores.map(sc=>`<td>${sc.roundTotal>0?'+':''}${sc.roundTotal.toLocaleString()}</td>`).join('')}</tr>`;
    const isLast=ri===S.rounds.length-1;
    return `<div class="round-row" id="rr-${ri}">
      <div class="rr-head" onclick="toggleRR(${ri})">
        <span class="rr-num">Hand ${round.roundNumber} <span style="font-size:.63rem;color:var(--muted);font-weight:400">Draw ${rule.drawCount} · Meld ${rule.meldMin}+</span></span>
        <div class="rr-scores">${chips}</div><span class="rr-chevron">▼</span>
      </div>
      <div class="rr-detail">
        <div style="overflow-x:auto"><table class="detail-table">
          <thead><tr><th></th>${thC}</tr></thead>
          <tbody>${dRows}${totRow}</tbody>
        </table></div>
        <div class="rr-actions">
          <button class="btn-sm btn-sm-plain" onclick="editRound(${ri})">Edit Hand</button>
          <button class="btn-sm btn-sm-danger" onclick="deleteRound(${ri})">Delete</button>
        </div>
      </div>
    </div>`;
  }).join('');

  const totals=range(S.playerCount).map(i=>({name:S.playerNames[i]||'P'+(i+1),total:runningTotal(i,S.rounds)})).sort((a,b)=>b.total-a.total);
  const totalsHTML=totals.map((p,i)=>`<div class="totals-row ${i===0?'leader':''}">
    <span class="totals-name">${i===0?'🏆 ':''}${h(p.name)}</span>
    <span class="totals-score">${p.total.toLocaleString()}</span>
  </div>`).join('');

  return `<div id="view-history" style="display:flex;flex-direction:column;flex:1;overflow:hidden">
    <div class="view-header">Hand History</div>
    <div class="history-scroll">
      <div class="summary-table-card">
        <div class="stc-title">Score Summary — All Hands</div>
        <div class="summary-table-wrap">
          <table class="summary-table">
            <thead><tr><th>Hand</th>${thCols}</tr></thead>
            <tbody>${handRows}${cumRows}<tr class="row-grand"><td>🏆 Grand Total</td>${grandCols}</tr></tbody>
          </table>
        </div>
      </div>
      ${roundRows}
      <div class="totals-card">
        <div class="totals-title">Grand Total Standings</div>${totalsHTML}
      </div>
    </div>
  </div>`;
}

// ─────────────────────────────────────────────────────────────
// RENDER: RULES
// ─────────────────────────────────────────────────────────────
function renderRules(){
  const handCards=HAND_RULES.map(r=>`<div class="hand-col">
    <div class="hand-num">Hand ${r.hand}</div>
    <div class="hand-stat"><span class="hand-stat-lbl">Draw</span><span class="hand-stat-val">${r.drawCount} cards</span></div>
    <div class="hand-stat"><span class="hand-stat-lbl">Meld min</span><span class="hand-stat-val">${r.meldMin} pts</span></div>
    <div class="hand-stat"><span class="hand-stat-lbl">Need clean</span><span class="hand-stat-val">${r.reqClean}</span></div>
    <div class="hand-stat"><span class="hand-stat-lbl">Need dirty</span><span class="hand-stat-val">${r.reqDirty}</span></div>
    <div class="hand-stat"><span class="hand-stat-lbl">Go out</span><span class="hand-stat-val gold">+${r.goOutBonus}</span></div>
  </div>`).join('');
  const scoring=[
    {c:'var(--red)',  e:'🔴',l:'Red 3',           v:'+100 each'},
    {c:'var(--green)',e:'♣', l:'Clean Book',       v:'+500 each'},
    {c:'var(--blue)', e:'♦', l:'Dirty Book',       v:'+300 each'},
    {c:'var(--gold)', e:'7️⃣',l:'Book of 7s',      v:'+1,000 each'},
    {c:'var(--orange)',e:'🃏',l:'Book of Wilds/2s', v:'+1,500 each'},
  ].map(s=>`<div class="scoring-row">
    <div class="scoring-row-lbl"><span class="score-dot" style="background:${s.c}"></span>${s.e} ${s.l}</div>
    <div class="scoring-row-val" style="color:${s.c}">${s.v}</div>
  </div>`).join('');
  return `<div id="view-rules" style="display:flex;flex-direction:column;flex:1;overflow:hidden">
    <div class="view-header">Rules &amp; Scoring</div>
    <div class="rules-scroll">
      <div class="rules-section"><div class="r-title">Per-Hand Requirements</div><div class="hand-grid">${handCards}</div></div>
      <div class="rules-section"><div class="r-title">Book &amp; Card Scoring</div>
        <div class="scoring-rows">${scoring}
          <div class="scoring-row"><div class="scoring-row-lbl"><span class="score-dot" style="background:var(--accent2)"></span>📋 Points of all cards</div><div class="scoring-row-val" style="color:var(--accent2)">face value</div></div>
          <div class="scoring-row"><div class="scoring-row-lbl"><span class="score-dot" style="background:var(--gold)"></span>☆ Going out bonus</div><div class="scoring-row-val" style="color:var(--gold)">varies per hand</div></div>
        </div>
      </div>
      <div class="rules-section"><div class="r-title">How to Play</div>
        <div class="rules-note"><ul>
          <li><b>Deal:</b> Pick up 2 piles of 11. Give one right, one left. One is your Hand, set aside your Foot.</li>
          <li><b>Each turn:</b> Draw the required cards, meld sets of same rank, discard to end.</li>
          <li><b>To lay down</b> you must meet the meld minimum with at least 3 of each card to total that amount.</li>
          <li><b>Clean book:</b> 7 natural cards of same rank (no wilds) → +500.</li>
          <li><b>Dirty book:</b> 7 cards with at least one wild (Joker or 2) → +300.</li>
          <li><b>Book of 7s:</b> 7 "7" rank cards → +1,000.</li>
          <li><b>Book of Wilds:</b> All wild cards → +1,500.</li>
          <li><b>Picking up Foot:</b> Must have laid every Hand card down first.</li>
          <li><b>Going out:</b> Empty your Foot. Must meet the clean &amp; dirty book requirements.</li>
          <li><b>Red 3s:</b> Lay down immediately; +100 each.</li>
          <li><b>Wilds</b> are Jokers and 2s.</li>
        </ul></div>
      </div>
      <div class="settings-section"><div class="s-section-title">Data &amp; Game</div>
        <div class="export-row">
          <button class="btn-export" onclick="exportJSON()">Export JSON</button>
          <button class="btn-export" onclick="exportCSV()">Export CSV</button>
        </div>
        <div class="danger-row"><button class="btn-danger" onclick="newGameConfirm()">New Game</button></div>
      </div>
    </div>
  </div>`;
}

// ─────────────────────────────────────────────────────────────
// MAIN RENDER
// ─────────────────────────────────────────────────────────────
function render(){
  const app=$('app');
  if(S.screen==='setup'){app.innerHTML=renderSetup();return;}
  app.innerHTML=`<div id="screen-main">
    ${renderSidebar()}
    <div id="content-row">
      <div id="main-content"></div>
    </div>
    ${renderBottomNav()}
  </div>`;
  renderView();
}
function renderView(){
  const mc=$('main-content');if(!mc)return;
  if(S.view==='game') renderGameView();
  else if(S.view==='history') mc.innerHTML=renderHistory();
  else mc.innerHTML=renderRules();
  // sync sidebar active state
  document.querySelectorAll('.sb-btn[onclick^="switchView"]').forEach(b=>{
    b.classList.toggle('active',b.getAttribute('onclick')===`switchView('${S.view}')`);
  });
}

// ─────────────────────────────────────────────────────────────
// EVENTS
// ─────────────────────────────────────────────────────────────
function switchView(v){S.view=v;save();renderView();}
function selectPlayer(pid){S.activePlayer=pid;renderGameView();}
function setPlayerCount(n){S.playerCount=n;save();render();}
function startGame(){
  document.querySelectorAll('.pname').forEach(inp=>{
    const i=+inp.dataset.i;S.playerNames[i]=inp.value.trim()||'Player '+(i+1);
  });
  S.rounds=[];S.cur=null;S.undo=[];S.screen='game';S.view='game';S.activePlayer=0;
  initRound();save();render();
}
function resumeGame(){S.screen='game';if(!S.cur)initRound();render();}
function toggleRR(ri){const el=$(`rr-${ri}`);if(el)el.classList.toggle('open');}
function editRound(ri){
  confirmDialog('Edit Hand','Reload Hand '+(S.rounds[ri].roundNumber)+' for editing? It will be removed from history until you re-save it.',
    function(){
      S.cur=JSON.parse(JSON.stringify(S.rounds[ri]));
      S.editingIndex=ri;          // remember where to put it back
      S.rounds.splice(ri,1);
      S.undo=[];S.view='game';S.activePlayer=0;
      save();render();
    },false);
}
function deleteRound(ri){
  confirmDialog('Delete Hand',`Permanently delete Hand ${S.rounds[ri].roundNumber}?`,()=>{S.rounds.splice(ri,1);save();renderView();});
}
function newGameConfirm(){
  confirmDialog('New Game','Clear all scores and start fresh? Export first to keep this game.',
    ()=>{S.rounds=[];S.cur=null;S.undo=[];S.screen='setup';save();render();});
}

// ─────────────────────────────────────────────────────────────
// EXPORT
// ─────────────────────────────────────────────────────────────
function exportJSON(){
  dl('handfootscore.json',JSON.stringify({
    exportedAt:new Date().toISOString(),game:'Progressive Hand and Foot',
    players:range(S.playerCount).map(i=>S.playerNames[i]||'P'+(i+1)),
    hands:S.rounds.map(r=>({hand:r.roundNumber,scores:r.scores.map(sc=>({
      player:S.playerNames[sc.playerId]||'P'+(sc.playerId+1),meldPoints:sc.meldPoints,
      red3Count:sc.red3Count,cleanBooks:sc.cleanBooks,dirtyBooks:sc.dirtyBooks,
      bookOf7s:sc.bookOf7s,bookOfWilds:sc.bookOfWilds,wentOut:sc.wentOut,handTotal:sc.roundTotal
    }))}))
  },null,2),'application/json');
}
function exportCSV(){
  const names=range(S.playerCount).map(i=>S.playerNames[i]||'P'+(i+1));
  const rows=S.rounds.map(r=>{const rule=handRule(r.roundNumber);
    return[r.roundNumber,rule.drawCount,rule.meldMin,...range(S.playerCount).map(i=>{const sc=r.scores.find(s=>s.playerId===i);return sc?sc.roundTotal:0;})].join(',');
  });
  dl('handfootscore.csv',[['Hand','Draw','Meld Min',...names].join(','),...rows,
    ['Grand Total','','', ...range(S.playerCount).map(i=>runningTotal(i,S.rounds))].join(',')].join('\n'),'text/csv');
}
function dl(name,content,type){const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([content],{type}));a.download=name;a.click();}

// ─────────────────────────────────────────────────────────────
// PWA
// ─────────────────────────────────────────────────────────────
(function(){
  const m={name:'Hand & Foot Score',short_name:'H&F Score',start_url:'./',display:'standalone',
    background_color:'#0d1117',theme_color:'#0d1117',
    icons:[{src:"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='80' fill='%230d1117'/%3E%3Ctext x='256' y='350' text-anchor='middle' font-size='300' fill='%237c3aed'%3E%E2%99%A0%3C/text%3E%3C/svg%3E",sizes:'512x512',type:'image/svg+xml',purpose:'any maskable'}]};
  const ml=document.createElement('link');ml.rel='manifest';
  ml.href=URL.createObjectURL(new Blob([JSON.stringify(m)],{type:'application/manifest+json'}));
  document.head.appendChild(ml);
  if('serviceWorker'in navigator){
    navigator.serviceWorker.register(URL.createObjectURL(new Blob([`const C='hnf-v4';
self.addEventListener('install',e=>{e.waitUntil(caches.open(C).then(c=>c.addAll([self.location.pathname])));self.skipWaiting();});
self.addEventListener('activate',e=>{e.waitUntil(clients.claim());});
self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)));});`],{type:'application/javascript'}))).catch(()=>{});
  }
  let dp;window.addEventListener('beforeinstallprompt',e=>{e.preventDefault();dp=e;
    const b=document.createElement('div');
    b.style.cssText='position:fixed;top:0;left:0;right:0;background:#7c3aed;color:#fff;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;z-index:2000;font-size:.84rem;font-weight:600;';
    b.innerHTML=`<span>Install Hand &amp; Foot Score</span><div style="display:flex;gap:8px">
      <button onclick="this.closest('div[style]').remove()" style="border:1px solid rgba(255,255,255,.4);background:transparent;color:#fff;padding:5px 10px;border-radius:6px;cursor:pointer;font-size:.78rem">Later</button>
      <button id="_ib" style="background:#fff;color:#7c3aed;border:none;padding:5px 12px;border-radius:6px;cursor:pointer;font-weight:700;font-size:.78rem">Install</button>
    </div>`;
    document.body.prepend(b);b.querySelector('#_ib').onclick=async()=>{b.remove();dp.prompt();await dp.userChoice;};
  });
})();

// ─────────────────────────────────────────────────────────────
// THEME
// ─────────────────────────────────────────────────────────────
function applyTheme(light){
  document.documentElement.classList.toggle('light', light);
  // update sidebar label if it exists
  var lbl=document.getElementById('sb-theme-lbl');
  if(lbl)lbl.textContent=light?'Dark Mode':'Light Mode';
  // update meta theme-color
  var mc=document.querySelector('meta[name="theme-color"]');
  if(mc)mc.content=light?'#f5f6fa':'#0d1117';
}
function toggleTheme(){
  var isLight=!document.documentElement.classList.contains('light');
  localStorage.setItem('hnf-theme', isLight?'light':'dark');
  applyTheme(isLight);
  // re-render sidebar label in place without full render
  var lbl=document.getElementById('sb-theme-lbl');
  if(lbl)lbl.textContent=isLight?'Dark Mode':'Light Mode';
}
function loadTheme(){
  var t=localStorage.getItem('hnf-theme');
  // default to dark; apply light only if explicitly set
  applyTheme(t==='light');
}

load();loadTheme();render();
</script>
</body>
</html>
